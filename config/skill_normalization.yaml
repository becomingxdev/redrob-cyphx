# Skill normalization rules for the multi-source SkillsExtractor.
#
# aliases
#   Keys are lower-cased raw/alias forms found in free text.
#   Values are the canonical display name to use in output.
#   The extractor always lower-cases both sides before matching.
#
# soft_skills
#   Tokens that appear in free text but should NOT be extracted as skills.
#   Checked after tokenization, before normalization.
#
# extraction
#   Tunables controlling the free-text tokenizer behaviour.

