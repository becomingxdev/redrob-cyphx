# ---------------------------------------------------------------------------
# Extraction tuning parameters
# ---------------------------------------------------------------------------
extraction:
  # Minimum character length for a free-text token to be considered a skill
  min_token_length: 2
  # Maximum number of whitespace-separated words a multi-word skill phrase can have
  max_tokens_per_skill: 4
  # Max context snippet length (chars) stored per occurrence
  max_context_length: 120
  # Max number of context snippets stored per skill
  max_contexts: 3
