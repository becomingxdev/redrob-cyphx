# Job Description Configuration — Senior AI Engineer (Founding Team)
# This file defines all JD-specific parameters that drive JD-aware scoring.
# Loaded once at startup; never modified at runtime.

# Target title for exact/close matching in title_score.py
target_title: "Senior AI Engineer"

# Ideal years of experience (midpoint of 5-9 year range stated in JD)
target_yoe: 7.0
ideal_yoe_min: 5.0
ideal_yoe_max: 9.0

# ----------------------------------------------------------------
# Skills hierarchy
# ----------------------------------------------------------------

# Absolutely required — 40-point scoring lever in skill_score.py
required_skills:
  - "python"
  - "embeddings"
  - "vector db"
  - "vector database"
  - "retrieval"
  - "ranking"
  - "evaluation"
  - "nlp"
  - "machine learning"
  - "pinecone"
  - "weaviate"
  - "faiss"
  - "chroma"
  - "qdrant"
  - "milvus"
  - "information retrieval"
  - "semantic search"
  - "ndcg"
  - "mrr"
  - "map"
  - "rag"
  - "retrieval augmented generation"
  - "llm"

# Nice-to-have — 15-point scoring lever in skill_score.py
preferred_skills:
  - "fine-tuning"
  - "lora"
  - "rlhf"
  - "pytorch"
  - "tensorflow"
  - "distributed systems"
  - "learning to rank"
  - "elasticsearch"
