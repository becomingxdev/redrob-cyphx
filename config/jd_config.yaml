  - "mlflow"
  - "kubeflow"
  - "feast"

# Skills that are primary expertise red flags (without NLP/retrieval presence)
# A candidate dominated by these without required_skills is a domain mismatch.
anti_skills:
  - "computer vision"
  - "opencv"
  - "object detection"
  - "image segmentation"
  - "speech recognition"
  - "asr"
  - "tts"
  - "text to speech"
  - "robotics"
  - "ros"
  - "slam"
  - "autonomous vehicles"
  - "langchain"  # framework enthusiast without underlying skills
  - "llamaindex"  # framework enthusiast without underlying skills

# Framework-enthusiast signals: these alone without required_skills = red flag
framework_only_skills:
  - "langchain"
  - "llamaindex"
  - "autogpt"
  - "agentgpt"

