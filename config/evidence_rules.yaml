# Evidence layer configuration for the REDROB ranker.
#
# These weights tune how cross-signal consistency and source-based confidence
# are computed. All values are *relative*: they are normalized at compute time,
# so only their magnitudes relative to one another matter.
#
# This file is optional. If it is missing or a key is absent, the modules fall
# back to their built-in defaults.

# ---------------------------------------------------------------------------
# Consistency analysis (src/evidence/consistency.py)
# ---------------------------------------------------------------------------
# Per-check weights for the pairwise signal-agreement checks. Each weight
# contributes to the denominator; (weight * agreed) contributes to the
# numerator of the normalized consistency_score in [0.0, 1.0].
consistency_weights:
  headline_title: 1.0        # headline seniority vs current-title seniority
  title_career: 1.0          # current-title seniority vs career seniority ceiling
  title_skills_domain: 1.0   # title domain keywords vs skill domain keywords
  experience_yoe: 1.5        # summed career tenure vs declared years of experience
  education_skills: 0.5      # education field-of-study vs skill domain keywords
  assessment_skills: 1.0     # skill-assessment subjects vs declared skills

# ---------------------------------------------------------------------------
# Confidence calculation (src/evidence/confidence.py)
# ---------------------------------------------------------------------------
# Per-source weights applied when a source supports a feature. Higher means
# that source is considered stronger corroboration.
confidence_source_weights:
  skills: 1.0          # explicit declaration
  experience: 1.2      # demonstrated in role descriptions/titles
  career_history: 1.0  # appears in company/title/industry history
  summary: 0.8         # self-described in headline/summary
  projects: 1.3        # tangible project evidence (highest signal)

# Global confidence parameters.
confidence_params:
  min_confidence: 0.0      # floor applied to the final confidence value
  max_confidence: 1.0      # ceiling applied to the final confidence value
  # How strongly the consistency score modulates final confidence.
  # 0.0 = consistency ignored; 1.0 = confidence fully gated by consistency.
  consistency_weight: 0.15
